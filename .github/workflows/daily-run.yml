name: Job Bot Daily Run

on:
  schedule:
    - cron: '0 8 * * *' # Gira tutti i giorni alle 8:00 UTC
  workflow_dispatch: # Ti permette di farlo partire anche a mano con un bottone

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
      - name: Check out del codice
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Installa le dipendenze
        run: pip install -r requirements.txt

      - name: Esegui lo script
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        run: python main.py
